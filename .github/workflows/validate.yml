name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin shellcheck to the version developers run locally (0.11.0) so CI is
      # deterministic and does not drift with the runner image's bundled version.
      # An older bundled shellcheck emits an SC2015 false positive on `A && B || C`
      # (with a benign `|| true`) that 0.11.0 already suppresses. The release
      # tarball is checksum-verified before use.
      - name: Install shellcheck 0.11.0 (pinned, checksum-verified)
        run: |
          set -euo pipefail
          version=v0.11.0
          sha256=8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
          url="https://github.com/koalaman/shellcheck/releases/download/${version}/shellcheck-${version}.linux.x86_64.tar.xz"
          curl -fsSL -o shellcheck.tar.xz "$url"
          echo "${sha256}  shellcheck.tar.xz" | sha256sum -c -
          tar -xJf shellcheck.tar.xz
          sudo install -m 0755 "shellcheck-${version}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: shellcheck
        run: shellcheck scripts/*.sh core/hooks/*.sh scaffold/hooks/*.sh

      - name: validate marketplace manifests and components
        run: ./scripts/validate.sh

      - name: test block-main-writes hook
        run: ./scripts/test-block-main-writes.sh
